<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Territory Runner</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; background:#f5f5f5; }

.screen{
  display:none;
  height:calc(100vh - 65px);
}

#map,#tourMap,#territoryMap{
  height:100%;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  height:65px;
  background:#111;
  display:flex;
  justify-content:space-around;
  align-items:center;
  color:white;
}

.tab{
  flex:1;
  text-align:center;
  font-size:14px;
  cursor:pointer;
}

.active{
  background:#2ecc71;
  padding:8px;
  border-radius:10px;
}

.account-container{
  padding:20px;
}

input{
  width:100%;
  padding:10px;
  margin-bottom:15px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#2ecc71;
  color:white;
  font-size:16px;
}

</style>
</head>
<body>

<!-- SCREENS -->

<div id="home" class="screen">
  <div id="map"></div>
</div>

<div id="tour" class="screen">
  <div id="tourMap"></div>
</div>

<div id="territory" class="screen">
  <div id="territoryMap"></div>
</div>

<div id="account" class="screen">
  <div class="account-container">
    <h3>Profile</h3>
    <input id="accUsername" placeholder="Username (required)">
    <input id="accBio" placeholder="Bio">
    <input id="accPhone" placeholder="Phone">
    <input id="accCity" placeholder="Home Town">
    <button onclick="saveProfile()">Save Profile</button>
  </div>
</div>

<!-- BOTTOM NAV -->

<div class="bottom-nav">
  <div class="tab active" onclick="showScreen('home',this)">Home</div>
  <div class="tab" onclick="showScreen('tour',this)">Tour</div>
  <div class="tab" onclick="showScreen('territory',this)">Territory</div>
  <div class="tab" onclick="showScreen('account',this)">Account</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const API="https://territory-backend-production.up.railway.app";
const gridSize=0.0002;

let userId=null;
let username=localStorage.getItem("username");

if(!username){
  username=prompt("Enter username:");
  localStorage.setItem("username",username);
}

document.getElementById("accUsername").value=username;

fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username})
})
.then(res=>res.json())
.then(data=>{
  userId=data.user_id;
  loadTerritories();
  startTracking();
});

function showScreen(id,el){
  document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
  document.getElementById(id).style.display="block";
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");

  setTimeout(()=>{
    map.invalidateSize();
    tourMap.invalidateSize();
    territoryMap.invalidateSize();
  },200);
}

showScreen("home",document.querySelector(".tab"));

let map=L.map('map');
let tourMap=L.map('tourMap');
let territoryMap=L.map('territoryMap');

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(tourMap);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(territoryMap);

let marker;
let drawnBlocks={};
let myBlocks=[];

function getBlockId(lat,lng){
  let x=Math.floor(lat/gridSize);
  let y=Math.floor(lng/gridSize);
  return x+"_"+y;
}

function drawBlock(blockId,ownerId,targetMap){
  let parts=blockId.split("_");
  let x=parseInt(parts[0])*gridSize;
  let y=parseInt(parts[1])*gridSize;

  let bounds=[[x,y],[x+gridSize,y+gridSize]];

  let color;

  if(ownerId==userId) color="green";
  else if(myBlocks.includes(blockId)) color="yellow";
  else color="red";

  L.rectangle(bounds,{
    color:color,
    fillColor:color,
    fillOpacity:0.5
  }).addTo(targetMap);
}

function loadTerritories(){
  fetch(API+"/territories")
  .then(res=>res.json())
  .then(data=>{
    data.forEach(block=>{
      drawBlock(block.block_id,block.owner_id,map);
    });
  });
}

function startTracking(){
navigator.geolocation.watchPosition(pos=>{

let lat=pos.coords.latitude;
let lng=pos.coords.longitude;

let blockId=getBlockId(lat,lng);

if(!drawnBlocks[blockId]){
fetch(API+"/capture",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
block_id:blockId,
user_id:userId
})
});

drawnBlocks[blockId]=true;
myBlocks.push(blockId);

drawBlock(blockId,userId,map);
drawBlock(blockId,userId,tourMap);
drawBlock(blockId,userId,territoryMap);
}

if(!marker){
marker=L.marker([lat,lng]).addTo(map);
map.setView([lat,lng],18);
tourMap.setView([lat,lng],16);
territoryMap.setView([lat,lng],16);
}else{
marker.setLatLng([lat,lng]);
}

});
}

function saveProfile(){
let profile={
username:document.getElementById("accUsername").value,
bio:document.getElementById("accBio").value,
phone:document.getElementById("accPhone").value,
city:document.getElementById("accCity").value
};

localStorage.setItem("profile",JSON.stringify(profile));
alert("Profile Saved");
}

</script>
</body>
</html>
