<!DOCTYPE html>
<html>
<head>
    <title>Road Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <style>
        body { margin: 0; font-family: Arial; }

        .screen {
            display: none;
            height: calc(100vh - 60px);
        }

        #map { height: 100%; }

        .bottom-nav {
            height: 60px;
            display: flex;
            background: #111;
            color: white;
            position: fixed;
            bottom: 0;
            width: 100%;
        }

        .tab {
            flex: 1;
            text-align: center;
            line-height: 60px;
            cursor: pointer;
        }

        .active {
            background: #2ecc71;
        }
    </style>
</head>
<body>

<!-- SCREENS -->

<div id="home" class="screen">
    <div id="map"></div>
</div>

<div id="tour" class="screen">
    <h2 style="padding:20px;">City Tour</h2>
    <p style="padding:20px;">All places you have visited will appear here.</p>
</div>

<div id="territory" class="screen">
    <h2 style="padding:20px;">My Territory</h2>
    <p style="padding:20px;">Blocks you own will appear here.</p>
</div>

<div id="account" class="screen">
    <h2 style="padding:20px;">Account</h2>
    <p style="padding:20px;" id="userInfo"></p>
</div>

<!-- NAVIGATION -->

<div class="bottom-nav">
    <div class="tab active" onclick="showScreen('home',this)">Home</div>
    <div class="tab" onclick="showScreen('tour',this)">Tour</div>
    <div class="tab" onclick="showScreen('territory',this)">Territory</div>
    <div class="tab" onclick="showScreen('account',this)">Account</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const API = "https://territory-backend-production.up.railway.app";
const gridSize = 0.0002;

let userId = null;
let username = prompt("Enter username:");
let currentCity = null;
let visitedCities = new Set();

fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({username})
})
.then(res => res.json())
.then(data => {
    userId = data.user_id;
    document.getElementById("userInfo").innerText = "Logged in as: " + username;
    loadTerritories();
    startTracking();
});

function showScreen(id, element) {
    document.querySelectorAll(".screen").forEach(s => s.style.display = "none");
    document.getElementById(id).style.display = "block";

    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    element.classList.add("active");

    if(id === "tour"){
        renderVisitedCities();
    }
}

showScreen("home", document.querySelector(".tab"));

let map = L.map('map');

L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    { attribution: '© OpenStreetMap contributors' }
).addTo(map);

let marker;
let drawnBlocks = {};

function getBlockId(lat,lng){
    let x = Math.floor(lat/gridSize);
    let y = Math.floor(lng/gridSize);
    return x + "_" + y;
}

function drawBlock(blockId, ownerId){
    let parts = blockId.split("_");
    let x = parseInt(parts[0]) * gridSize;
    let y = parseInt(parts[1]) * gridSize;

    let bounds = [
        [x,y],
        [x+gridSize,y+gridSize]
    ];

    let color = ownerId == userId ? "green" : "blue";

    L.rectangle(bounds,{
        color:color,
        fillColor:color,
        fillOpacity:0.4
    }).addTo(map);
}

function loadTerritories(){
    fetch(API + "/territories")
    .then(res=>res.json())
    .then(data=>{
        data.forEach(block=>{
            drawBlock(block.block_id, block.owner_id);
        });
    });
}

function reverseGeocode(lat, lng){
    fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
    .then(res=>res.json())
    .then(data=>{
        if(!data.address) return;

        let detectedCity =
            data.address.city ||
            data.address.town ||
            data.address.village ||
            data.address.hamlet ||
            data.address.county;

        if(detectedCity && detectedCity !== currentCity){
            currentCity = detectedCity;
            visitedCities.add(currentCity);
            console.log("Entered city:", currentCity);
        }
    })
    .catch(err=>{
        console.log("Reverse geocode error:", err);
    });
}

function renderVisitedCities(){
    let tourScreen = document.getElementById("tour");

    let cityList = "<ul style='padding:20px;'>";
    visitedCities.forEach(city=>{
        cityList += "<li>" + city + "</li>";
    });
    cityList += "</ul>";

    tourScreen.innerHTML = `
        <h2 style="padding:20px;">City Tour</h2>
        <p style="padding:20px;">Cities you have visited:</p>
        ${cityList}
    `;
}

function startTracking(){
    navigator.geolocation.watchPosition(pos=>{

        let lat = pos.coords.latitude;
        let lng = pos.coords.longitude;

        // Reverse geocode city
        reverseGeocode(lat, lng);

        let blockId = getBlockId(lat,lng);

        if(!drawnBlocks[blockId]){
            fetch(API + "/capture",{
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({
                    block_id:blockId,
                    user_id:userId
                })
            });

            drawnBlocks[blockId]=true;
            drawBlock(blockId,userId);
        }

        if(!marker){
            marker=L.marker([lat,lng]).addTo(map);
            map.setView([lat,lng],18);
        }else{
            marker.setLatLng([lat,lng]);
        }

    }, err=>{
        alert("Location access denied.");
    }, {
        enableHighAccuracy: true
    });
}

</script>

</body>
</html>
