<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Territory Runner</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; }

.screen{
display:none;
height:calc(100vh - 65px);
}

#map,#tourMap,#territoryMap{
height:100%;
}

.bottom-nav{
position:fixed;
bottom:0;
width:100%;
height:65px;
background:#111;
display:flex;
color:white;
}

.tab{
flex:1;
text-align:center;
line-height:65px;
cursor:pointer;
}

.active{
background:#2ecc71;
}

input,button{
width:100%;
padding:10px;
margin-bottom:10px;
}

</style>
</head>
<body>

<div id="home" class="screen"><div id="map"></div></div>
<div id="tour" class="screen"><div id="tourMap"></div></div>
<div id="territory" class="screen"><div id="territoryMap"></div></div>

<div id="account" class="screen">
<div style="padding:20px;">
<h3>Profile</h3>
<input id="accUsername" disabled>
<input id="accBio" placeholder="Bio">
<input id="accPhone" placeholder="Phone">
<input id="accCity" placeholder="Hometown">
<button onclick="saveProfile()">Save</button>
</div>
</div>

<div id="leaderboard" class="screen">
<div style="padding:20px;">
<h3>Leaderboard</h3>
<div id="leaderboardList"></div>
</div>
</div>

<div class="bottom-nav">
<div class="tab active" onclick="showScreen('home',this)">Home</div>
<div class="tab" onclick="showScreen('tour',this)">Tour</div>
<div class="tab" onclick="showScreen('territory',this)">Territory</div>
<div class="tab" onclick="showScreen('leaderboard',this)">Ranks</div>
<div class="tab" onclick="showScreen('account',this)">Account</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const API="https://territory-backend-production.up.railway.app";
const gridSize=0.0002;

let userId=null;
let username=localStorage.getItem("username");

if(!username){
username=prompt("Enter username:");
localStorage.setItem("username",username);
}

document.getElementById("accUsername").value=username;

fetch(API+"/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username})
})
.then(res=>res.json())
.then(data=>{
userId=data.user_id;
loadProfile();
loadTerritories();
startTracking();
});

function showScreen(id,el){
document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
el.classList.add("active");
if(id==="leaderboard") loadLeaderboard();
}

showScreen("home",document.querySelector(".tab"));

let map=L.map('map');
let tourMap=L.map('tourMap');
let territoryMap=L.map('territoryMap');

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(tourMap);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(territoryMap);

let marker;
let myBlocks=[];
let drawnBlocks={};

function getBlockId(lat,lng){
let x=Math.floor(lat/gridSize);
let y=Math.floor(lng/gridSize);
return x+"_"+y;
}

function drawBlock(blockId,ownerId,targetMap){
let parts=blockId.split("_");
let x=parseInt(parts[0])*gridSize;
let y=parseInt(parts[1])*gridSize;

let bounds=[[x,y],[x+gridSize,y+gridSize]];

let color;
if(ownerId==userId) color="green";
else if(myBlocks.includes(blockId)) color="yellow";
else color="red";

L.rectangle(bounds,{color:color,fillColor:color,fillOpacity:0.5})
.addTo(targetMap);
}

function loadTerritories(){
fetch(API+"/territories")
.then(res=>res.json())
.then(data=>{
data.forEach(block=>{
drawBlock(block.block_id,block.owner_id,map);
});
});
}

function startTracking(){
navigator.geolocation.watchPosition(pos=>{
let lat=pos.coords.latitude;
let lng=pos.coords.longitude;

let blockId=getBlockId(lat,lng);

if(!drawnBlocks[blockId]){
fetch(API+"/capture",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
block_id:blockId,
user_id:userId
})
});
drawnBlocks[blockId]=true;
myBlocks.push(blockId);

drawBlock(blockId,userId,map);
drawBlock(blockId,userId,tourMap);
drawBlock(blockId,userId,territoryMap);
}

if(!marker){
marker=L.marker([lat,lng]).addTo(map);
map.setView([lat,lng],18);
tourMap.setView([lat,lng],16);
territoryMap.setView([lat,lng],16);
}else{
marker.setLatLng([lat,lng]);
}
});
}

function saveProfile(){
fetch(API+"/update_profile",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
user_id:userId,
bio:document.getElementById("accBio").value,
phone:document.getElementById("accPhone").value,
hometown:document.getElementById("accCity").value
})
})
.then(res=>res.json())
.then(()=>alert("Profile saved"));
}

function loadProfile(){
fetch(API+"/get_profile/"+userId)
.then(res=>res.json())
.then(data=>{
document.getElementById("accBio").value=data.bio||"";
document.getElementById("accPhone").value=data.phone||"";
document.getElementById("accCity").value=data.hometown||"";
});
}

function loadLeaderboard(){
fetch(API+"/leaderboard")
.then(res=>res.json())
.then(data=>{
let html="";
data.forEach((u,i)=>{
html+=`<p>${i+1}. ${u.username} — ${u.blocks} blocks</p>`;
});
document.getElementById("leaderboardList").innerHTML=html;
});
}

</script>
</body>
</html>
