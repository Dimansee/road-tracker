<!DOCTYPE html>
<html>
<head>
    <title>Road Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet/dist/leaflet.css"
    />

    <style>
        body { margin: 0; }
        #map { height: 100vh; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const API = "https://your-railway-domain.up.railway.app";
const gridSize = 0.0005;

let userId = null;
let username = prompt("Enter username:");

fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({username})
})
.then(res => res.json())
.then(data => {
    userId = data.user_id;
    loadTerritories();
    startTracking();
});

let map = L.map('map').setView([0,0],2);

L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    { attribution: '© OpenStreetMap contributors' }
).addTo(map);

let marker;
let drawnBlocks = {};

function getBlockId(lat,lng){
    let x = Math.floor(lat/gridSize);
    let y = Math.floor(lng/gridSize);
    return x + "_" + y;
}

function drawBlock(blockId, ownerId){
    let parts = blockId.split("_");
    let x = parseInt(parts[0]) * gridSize;
    let y = parseInt(parts[1]) * gridSize;

    let bounds = [
        [x,y],
        [x+gridSize,y+gridSize]
    ];

    let color = ownerId == userId ? "green" : "blue";

    L.rectangle(bounds,{
        color:color,
        fillColor:color,
        fillOpacity:0.4
    }).addTo(map);
}

function loadTerritories(){
    fetch(API + "/territories")
    .then(res=>res.json())
    .then(data=>{
        data.forEach(block=>{
            drawBlock(block.block_id, block.owner_id);
        });
    });
}

function startTracking(){
    navigator.geolocation.watchPosition(pos=>{

        let lat = pos.coords.latitude;
        let lng = pos.coords.longitude;

        let blockId = getBlockId(lat,lng);

        if(!drawnBlocks[blockId]){
            fetch(API + "/capture",{
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({
                    block_id:blockId,
                    user_id:userId
                })
            });

            drawnBlocks[blockId]=true;
            drawBlock(blockId,userId);
        }

        if(!marker){
            marker=L.marker([lat,lng]).addTo(map);
            map.setView([lat,lng],17);
        }else{
            marker.setLatLng([lat,lng]);
        }

    });
}

</script>

</body>
</html>
